name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://fs-pokedex-301g.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
          retry-all: true